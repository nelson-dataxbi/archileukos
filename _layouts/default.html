<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">

  <link rel="icon" href="{{ '/assets/img/favicon-32.png' | relative_url }}" sizes="32x32">
  <link rel="icon" href="{{ '/assets/img/icon-192.png' | relative_url }}" sizes="192x192">
  <link rel="apple-touch-icon" href="{{ '/assets/img/icon-192.png' | relative_url }}">
</head>
<body class="{{ page.body_class | default: 'content-page' }}">
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">archileukos.com</a>
    <nav class="site-nav" aria-label="Navegacion principal">
      <div class="nav-item has-dropdown">
        <a href="{{ '/proyectos/' | relative_url }}">Proyectos <span class="dropdown-indicator" aria-hidden="true"></span></a>
        <div class="dropdown">
          {% for project in site.data.projects %}
          <a href="{{ '/proyectos/' | append: project.slug | append: '/' | relative_url }}">{{ project.title }}</a>
          {% endfor %}
        </div>
      </div>
      <a href="{{ '/acerca-de-mi/' | relative_url }}">Acerca de mi</a>
    </nav>
  </header>
  <main class="site-main">
    <article class="wp-content">
{{ content }}
    </article>
  </main>
  <footer class="site-footer">
    <span>archileukos.com</span>
  </footer>
</body>
</html>
